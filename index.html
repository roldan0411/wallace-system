<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallace System — Software administrativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#01c38e; --verde-c:#2ee0aa; --verde-o:#019268;
    --navy:#132d46; --navy-o:#1a1e29;
    --rojo:#e74c3c; --azul:#2c7da0; --naranja:#e67e22;
    --bg:#eef2f5; --panel:#ffffff; --panel2:#f7f9fb;
    --txt:#1a1e29; --txt2:#3a4250; --gris:#6b7280;
    --linea:rgba(1,195,142,.18); --linea2:rgba(0,0,0,.07);
    --sombra:0 2px 12px rgba(19,45,70,.07);
    --sombra-g:0 8px 28px rgba(19,45,70,.12);
    --gold:var(--verde);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:inherit;font-size:inherit;}

  /* Carga */
  .cargando{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:var(--gris);}
  .spin{width:52px;height:52px;border:3px solid rgba(1,195,142,.2);border-top-color:var(--verde);border-radius:50%;animation:girar .8s linear infinite;margin-bottom:16px;}
  @keyframes girar{to{transform:rotate(360deg)}}

  /* Login */
  .login-fondo{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:linear-gradient(135deg,#0f1218,#132d46);}
  .login-caja{background:var(--panel);border-radius:20px;padding:36px 30px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .login-emblema{width:88px;height:88px;margin:0 auto 16px;border-radius:22px;overflow:hidden;box-shadow:0 8px 26px rgba(1,195,142,.3);}
  .login-emblema svg{width:100%;height:100%;display:block;}
  .login-marca{font-size:30px;font-weight:900;text-align:center;letter-spacing:-1px;}
  .login-marca span{color:var(--verde);}
  .login-sub{text-align:center;color:var(--gris);font-size:13px;margin:6px 0 22px;}
  .login-pie{text-align:center;font-size:10px;color:var(--gris);letter-spacing:1.4px;margin-top:20px;padding-top:16px;border-top:1px solid var(--linea2);}

  /* Estructura */
  .app-grid{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
  .sidebar{background:var(--panel);border-right:1px solid var(--linea2);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .side-cab{padding:22px 18px;text-align:center;border-bottom:1px solid var(--linea2);}
  .side-logo{max-width:82px;max-height:82px;border-radius:12px;margin-bottom:10px;}
  .side-ini{width:60px;height:60px;margin:0 auto 10px;border-radius:14px;background:linear-gradient(135deg,var(--verde),var(--verde-o));
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;}
  .side-nom{font-size:15px;font-weight:800;letter-spacing:.3px;}
  .side-tipo{font-size:10px;color:var(--gris);letter-spacing:1.6px;text-transform:uppercase;margin-top:3px;}
  .side-nav{flex:1;padding:14px 12px;}
  .nav-grupo{font-size:10px;color:var(--gris);letter-spacing:1.5px;padding:16px 10px 7px;font-weight:700;}
  .nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;cursor:pointer;
    color:var(--txt2);font-size:14px;font-weight:500;transition:.15s;margin-bottom:2px;}
  .nav-item:hover{background:var(--panel2);color:var(--txt);}
  .nav-item.on{background:rgba(1,195,142,.12);color:var(--verde-o);font-weight:700;}
  .nav-item svg{width:19px;height:19px;flex-shrink:0;}
  .side-pie{padding:14px;border-top:1px solid var(--linea2);}
  .user-box{display:flex;align-items:center;gap:10px;}
  .avatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--verde),var(--verde-o));
    color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;}
  .user-info{flex:1;min-width:0;}
  .u-nom{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .u-est{font-size:10px;color:var(--gris);display:flex;align-items:center;gap:5px;}
  .fb-dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:var(--gris);}
  .fb-dot.ok{background:var(--verde);box-shadow:0 0 6px var(--verde);}
  .fb-dot.off{background:var(--rojo);}
  .fb-dot.err{background:var(--naranja);animation:parp 1.2s infinite;}
  @keyframes parp{0%,100%{opacity:1}50%{opacity:.3}}
  .credito{margin-top:12px;padding-top:11px;border-top:1px solid var(--linea2);text-align:center;}
  .c-marca{display:block;font-size:13px;font-weight:800;color:var(--txt2);}
  .c-marca span{color:var(--verde);}
  .c-sub{display:block;font-size:9px;color:var(--gris);letter-spacing:1.3px;text-transform:uppercase;margin-top:2px;}

  .main{display:flex;flex-direction:column;min-width:0;}
  .banner-sup{background:linear-gradient(90deg,rgba(1,195,142,.16),transparent);border-bottom:1px solid var(--verde);
    padding:10px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:13px;font-weight:600;color:var(--verde-o);}
  .topbar{background:var(--panel);border-bottom:1px solid var(--linea2);padding:16px 26px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .topbar h1{font-size:21px;font-weight:800;display:flex;align-items:center;gap:10px;}
  .topbar h1 svg{width:22px;height:22px;}
  .tb-der{display:flex;align-items:center;gap:12px;}
  .reloj{font-size:13px;color:var(--gris);font-variant-numeric:tabular-nums;}
  .menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt);}
  .suc-sel{padding:8px 12px;background:var(--panel2);border:1px solid var(--verde);border-radius:9px;
    color:var(--verde-o);font-size:13px;font-weight:700;cursor:pointer;}
  .contenido{padding:24px 26px;max-width:1280px;width:100%;margin:0 auto;flex:1;min-width:0;}

  /* Tarjetas */
  .tarjeta{background:var(--panel);border:1px solid var(--linea2);border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:var(--sombra);}
  .t-cab{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .t-tit{font-size:16px;font-weight:800;display:flex;align-items:center;gap:9px;}
  .t-tit svg{width:19px;height:19px;color:var(--verde);}
  .t-tit.chico{font-size:14px;}
  .t-acc{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
  .tarjeta-pend{border-left:4px solid var(--verde);background:linear-gradient(135deg,rgba(1,195,142,.05),var(--panel));}
  .alerta{border-left:4px solid var(--rojo);background:linear-gradient(135deg,rgba(231,76,60,.05),var(--panel));}
  .alerta p{font-size:13px;line-height:1.7;margin-top:6px;}
  .centro-msg{max-width:480px;margin:40px auto;text-align:center;padding:36px 28px;}
  .msg-ico{font-size:42px;margin-bottom:12px;}
  .msg-ico svg{width:44px;height:44px;color:var(--verde);}
  .t-tit.centrado{justify-content:center;margin-bottom:8px;}
  .centro-msg p{color:var(--gris);font-size:14px;line-height:1.7;margin-bottom:18px;}
  .centro-msg .btn{margin:5px;}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:18px;}
  .stat{background:var(--panel);border:1px solid var(--linea2);border-radius:15px;padding:17px 19px;
    box-shadow:var(--sombra);border-left:4px solid var(--gris);}
  .stat.verde{border-left-color:var(--verde);}
  .stat.gold{border-left-color:var(--verde-c);}
  .stat.azul{border-left-color:var(--azul);}
  .stat.rojo{border-left-color:var(--rojo);}
  .stat-lbl{font-size:11px;color:var(--gris);letter-spacing:.4px;text-transform:uppercase;font-weight:600;}
  .stat-val{font-size:25px;font-weight:800;margin:5px 0 3px;letter-spacing:-.5px;}
  .stat-sub{font-size:11px;color:var(--gris);}
  .stat-grande{font-size:34px;font-weight:800;text-align:center;color:var(--verde-o);margin:10px 0;}

  /* Botones */
  .btn{background:var(--panel2);border:1px solid var(--linea2);color:var(--txt);padding:9px 15px;border-radius:10px;
    cursor:pointer;font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{background:#eef2f5;}
  .btn svg{width:15px;height:15px;}
  .btn-gold{background:linear-gradient(135deg,var(--verde),var(--verde-o));color:#fff;border:none;font-weight:700;}
  .btn-gold:hover{filter:brightness(1.08);}
  .btn-rojo{background:var(--rojo);color:#fff;border:none;}
  .btn-verde{background:var(--verde);color:#fff;border:none;}
  .btn-ghost{background:transparent;}
  .btn-sm{padding:7px 11px;font-size:12px;}
  .btn-block{width:100%;justify-content:center;margin-top:12px;}
  .btn-grande{padding:14px;font-size:15px;}
  .botones-fila{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}

  /* Formularios */
  .campo{width:100%;padding:11px 14px;background:var(--panel2);border:1px solid var(--linea2);
    border-radius:10px;color:var(--txt);margin-bottom:9px;}
  .campo:focus{outline:none;border-color:var(--verde);background:var(--panel);}
  .busca{padding:9px 13px;background:var(--panel2);border:1px solid var(--linea2);border-radius:10px;color:var(--txt);min-width:190px;}
  .busca-grande{width:100%;padding:14px 18px;background:var(--panel);border:1px solid var(--linea2);
    border-radius:12px;color:var(--txt);font-size:15px;margin-bottom:14px;box-shadow:var(--sombra);}
  .m-row{margin-bottom:13px;}
  .m-row label{display:block;font-size:12px;color:var(--gris);margin-bottom:5px;font-weight:600;}
  .m-row input,.m-row select,.m-row textarea{width:100%;padding:11px 14px;background:var(--panel2);
    border:1px solid var(--linea2);border-radius:10px;color:var(--txt);}
  .form2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;}
  .chk{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--panel2);
    border:1px solid var(--linea2);border-radius:10px;cursor:pointer;font-size:13px;}
  .chk input{width:16px;height:16px;accent-color:var(--verde);cursor:pointer;}
  .nota{font-size:12px;color:var(--gris);margin-top:-4px;margin-bottom:10px;}
  .suc-fila{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .suc-fila .campo{margin-bottom:0;}

  /* Tablas */
  .tabla-wrap{overflow-x:auto;border-radius:11px;}
  .tabla{width:100%;border-collapse:collapse;font-size:13.5px;}
  .tabla th{text-align:left;padding:12px 14px;color:var(--gris);font-size:11px;letter-spacing:.6px;
    text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--linea2);white-space:nowrap;}
  .tabla td{padding:13px 14px;border-bottom:1px solid var(--linea2);vertical-align:middle;}
  .tabla tr:last-child td{border-bottom:none;}
  .fila-pend{background:rgba(1,195,142,.04);}
  .acciones{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

  /* Píldoras */
  .pill{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;
    background:var(--panel2);border:1px solid var(--linea2);}
  .pill-verde{background:rgba(1,195,142,.14);color:var(--verde-o);border-color:rgba(1,195,142,.3);}
  .pill-rojo{background:rgba(231,76,60,.12);color:var(--rojo);border-color:rgba(231,76,60,.28);}
  .pill-gold{background:rgba(1,195,142,.14);color:var(--verde-o);border-color:rgba(1,195,142,.3);}
  .pill.grande{font-size:14px;padding:7px 15px;}

  /* Colores de texto */
  .verde{color:var(--verde-o);} .rojo{color:var(--rojo);} .azul{color:var(--azul);}
  .oro{color:var(--verde-o);} .gris{color:var(--gris);} .negrita{font-weight:700;}
  .chico{font-size:11.5px;} .centrado{text-align:center;}

  /* Líneas de resumen */
  .linea{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;
    border-bottom:1px solid var(--linea2);font-size:14px;}
  .linea:last-child{border-bottom:none;}
  .linea.desc{color:var(--rojo);}
  .total-linea{border-top:2px solid var(--verde);border-bottom:none;margin-top:6px;padding-top:12px;font-weight:800;font-size:15px;}
  .mini-x{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:16px;padding:0 4px;}

  /* Grid 2 columnas */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

  /* Venta */
  .caja-aviso{padding:11px 16px;margin-bottom:16px;background:rgba(1,195,142,.08);
    border:1px solid rgba(1,195,142,.22);border-radius:11px;font-size:13px;color:var(--txt2);}
  .venta-grid{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:18px;align-items:start;width:100%;}
  .venta-izq{min-width:0;}
  .carrito{position:sticky;top:16px;min-width:0;}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .cat{background:var(--panel);border:1px solid var(--linea2);color:var(--gris);padding:8px 15px;
    border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .cat.on{background:var(--verde);color:#fff;border-color:var(--verde);}
  .prods{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:13px;}
  .prod{background:var(--panel);border:1px solid var(--linea2);border-radius:14px;padding:15px;
    text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--sombra);}
  .prod:hover{transform:translateY(-2px);box-shadow:var(--sombra-g);border-color:var(--verde);}
  .prod.off{opacity:.5;}
  .prod-ico{height:46px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;position:relative;}
  .prod-ico svg{width:26px;height:26px;color:var(--verde);}
  .prod-ico img{max-height:46px;max-width:100%;border-radius:8px;}
  .badge-off{position:absolute;top:-4px;right:-4px;background:var(--rojo);color:#fff;
    font-size:8px;padding:2px 6px;border-radius:8px;font-weight:800;}
  .badge-off.amarillo{background:var(--naranja);}
  .prod-nom{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:4px;}
  .prod-cat{font-size:10px;color:var(--gris);margin-bottom:5px;}
  .prod-pre{font-size:16px;font-weight:800;color:var(--verde-o);}
  .prod-stock{font-size:10.5px;color:var(--gris);margin-top:4px;}
  .prod-stock.poco{color:var(--naranja);font-weight:700;}
  .prod-stock.sin{color:var(--rojo);font-weight:700;}
  .prod-acc{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:9px;}
  .prods.inv .prod{cursor:default;}
  .prods.inv .prod:hover{transform:none;}
  .tipos{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;}
  .tipo{flex:1;min-width:80px;background:var(--panel2);border:1px solid var(--linea2);color:var(--gris);
    padding:9px 6px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;}
  .tipo.on{background:var(--verde);color:#fff;border-color:var(--verde);}
  .items{margin:12px 0;max-height:230px;overflow-y:auto;}
  .item{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--linea2);}
  .item-info{flex:1;min-width:0;}
  .item-nom{font-size:13px;font-weight:700;}
  .item-uni{font-size:11px;color:var(--gris);}
  .item-qty{display:flex;align-items:center;gap:7px;}
  .item-qty button{width:26px;height:26px;border-radius:7px;border:1px solid var(--linea2);
    background:var(--panel2);cursor:pointer;font-size:15px;font-weight:700;color:var(--txt);}
  .item-qty span{min-width:20px;text-align:center;font-weight:700;font-size:14px;}
  .item-tot{font-weight:700;font-size:13.5px;min-width:72px;text-align:right;}
  .carrito-vacio{text-align:center;color:var(--gris);padding:32px 16px;font-size:32px;}
  .carrito-vacio p{font-size:12.5px;margin-top:8px;}
  .total{display:flex;justify-content:space-between;font-size:20px;font-weight:800;
    padding:14px 0;border-top:2px solid var(--verde);margin-top:10px;color:var(--verde-o);}

  /* Barras */
  .barras{display:flex;align-items:flex-end;gap:7px;height:165px;padding-top:16px;}
  .barra{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .b-val{font-size:9.5px;color:var(--gris);height:12px;}
  .b-fill{width:100%;background:linear-gradient(180deg,var(--verde),var(--verde-o));border-radius:6px 6px 0 0;min-height:4px;}
  .b-lbl{font-size:10px;color:var(--gris);font-weight:600;}

  /* Logo del negocio */
  .logo-zona{display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-top:14px;}
  .logo-vista{width:130px;height:130px;border:2px dashed var(--linea2);border-radius:14px;
    display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--panel2);flex-shrink:0;}
  .logo-vista img{max-width:100%;max-height:100%;object-fit:contain;}
  .logo-vacio{color:var(--gris);font-size:12px;}
  .logo-acc{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}

  /* Modal */
  #modal-container{display:none;}
  #modal-container.activo{display:block;}
  .modal-fondo{position:fixed;inset:0;background:rgba(15,18,24,.55);backdrop-filter:blur(3px);z-index:100;}
  .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
    border-radius:18px;width:calc(100% - 32px);max-width:460px;max-height:88vh;overflow-y:auto;
    z-index:101;box-shadow:0 24px 70px rgba(0,0,0,.3);}
  .modal-cab{padding:19px 22px;border-bottom:1px solid var(--linea2);display:flex;
    align-items:center;justify-content:space-between;}
  .modal-cab h3{font-size:17px;font-weight:800;}
  .modal-x{background:none;border:none;font-size:26px;color:var(--gris);cursor:pointer;line-height:1;}
  .modal-cuerpo{padding:20px 22px;}
  .modal-pie{padding:15px 22px;border-top:1px solid var(--linea2);display:flex;gap:9px;justify-content:flex-end;}
  .cobro-caja{margin-top:8px;padding:15px 17px;background:var(--panel2);border:1px solid var(--linea2);border-radius:12px;}
  .c-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px;}
  .c-total{border-top:2px solid var(--verde);margin-top:8px;padding-top:12px;font-size:17px;font-weight:800;}
  .c-total strong{color:var(--verde-o);font-size:20px;}
  .c-nota{display:none;margin-top:11px;padding:10px 13px;background:rgba(1,195,142,.08);
    border-left:3px solid var(--verde);border-radius:7px;font-size:12px;line-height:1.6;color:var(--txt2);}

  /* Avisos */
  #toasts{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:9px;}
  .toast{background:var(--panel);border:1px solid var(--linea2);border-left:4px solid var(--verde);
    padding:13px 18px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:var(--sombra-g);
    animation:entrar .25s ease;max-width:330px;}
  .toast.error{border-left-color:var(--rojo);}
  .toast.info{border-left-color:var(--azul);}
  .toast.salir{animation:salir .3s ease forwards;}
  @keyframes entrar{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
  @keyframes salir{to{opacity:0;transform:translateX(30px)}}

  /* Super-admin */
  .sa-emblema{display:inline-block;width:32px;height:32px;border-radius:9px;overflow:hidden;vertical-align:middle;}
  .sa-emblema svg{width:100%;height:100%;display:block;}
  .sa-marca{font-weight:900;letter-spacing:-.4px;}
  .sa-marca span{color:var(--verde);}

  /* Responsive */
  @media(max-width:1000px){
    .venta-grid{grid-template-columns:1fr;}
    .carrito{position:static;}
