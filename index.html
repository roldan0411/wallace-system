<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wallace System — Sistema para todo negocio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    /* Paleta Wallace System (Sborg): verde esmeralda + azules profundos */
    --gold:#01c38e; --gold-l:#2ee0aa; --gold-d:#019268;
    --red:#c0392b; --red-l:#e74c3c; --green:#01c38e; --green-d:#019268;
    --blue:#2c7da0; --blue-l:#4a9cbf; --orange:#e67e22;
    --bg:#0f1218; --bg2:#151a24; --panel:#1a1e29; --panel2:#212636;
    --card:#1a1e29; --line:rgba(1,195,142,.12); --line2:rgba(255,255,255,.06);
    --txt:#f4f6f8; --txt2:#c6ccd6; --muted:#8b93a3;
    --navy:#132d46; --navy-d:#1a1e29;
    --shadow:0 8px 30px rgba(0,0,0,.4); --shadow-lg:0 16px 50px rgba(0,0,0,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;}
  input,select,button,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-track{background:var(--bg2);} ::-webkit-scrollbar-thumb{background:rgba(1,195,142,.2);border-radius:6px;}

  /* ===== LAYOUT CON SIDEBAR ===== */
  .layout{display:flex;min-height:100vh;}
  .sidebar{width:250px;background:linear-gradient(180deg,var(--panel),var(--bg2));border-right:1px solid var(--line);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20;transition:.3s;}
  .sidebar-logo{padding:20px 18px;border-bottom:1px solid var(--line);text-align:center;}
  .sidebar-logo .brand{font-size:22px;font-weight:900;letter-spacing:-.5px;color:var(--txt);}
  .sidebar-logo .brand span{color:var(--gold);}
  .sidebar-logo .sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .sidebar-logo .neg-badge{margin-top:10px;font-size:12px;color:var(--gold-l);font-weight:600;background:rgba(1,195,142,.08);padding:5px 10px;border-radius:8px;}
  .sidebar-logo .neg-logo-img{max-height:64px;max-width:150px;object-fit:contain;border-radius:10px;margin:0 auto 8px;display:block;}
  .sidebar-logo .neg-logo-nombre{font-size:16px;font-weight:800;color:var(--txt);letter-spacing:-.3px;}
  .nav{flex:1;overflow-y:auto;padding:12px 10px;}
  .nav-group{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:14px 12px 6px;font-weight:700;}
  .nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;color:var(--txt2);cursor:pointer;font-size:14px;font-weight:500;margin-bottom:2px;transition:.15s;border:1px solid transparent;}
  .nav-item:hover{background:rgba(255,255,255,.04);color:var(--txt);}
  .nav-item.active{background:linear-gradient(90deg,rgba(1,195,142,.18),rgba(1,195,142,.05));color:var(--gold);border-color:rgba(1,195,142,.2);font-weight:600;}
  .nav-item svg{width:19px;height:19px;flex-shrink:0;}
  .nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;}
  .sidebar-foot{padding:14px;border-top:1px solid var(--line);}
  .wallace-credit{margin-top:12px;padding-top:11px;border-top:1px solid var(--line2);text-align:center;}
  .wc-brand{display:block;font-size:13px;font-weight:800;letter-spacing:-.2px;color:var(--txt2);}
  .wc-brand span{color:var(--gold);}
  .wc-sub{display:block;font-size:9px;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;margin-top:2px;}
  .user-box{display:flex;align-items:center;gap:10px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#000;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
  .user-info{flex:1;min-width:0;}
  .user-info .n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-info .r{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}

  .main{flex:1;margin-left:250px;min-height:100vh;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 26px;background:var(--bg2);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .topbar h1{font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px;}
  .topbar .tb-right{display:flex;align-items:center;gap:12px;}
  .clock{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .content{padding:26px;max-width:1240px;width:100%;margin:0 auto;flex:1;}

  .menu-toggle{display:none;background:none;border:none;color:var(--gold);cursor:pointer;}

  /* ===== CARDS ===== */
  .card{background:linear-gradient(160deg,var(--card),var(--panel));border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:20px;box-shadow:var(--shadow);}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
  .card-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:9px;}
  .card-title svg{width:20px;height:20px;color:var(--gold);}
  .muted{color:var(--muted);font-size:13px;line-height:1.65;}
  .sep{border:none;border-top:1px solid var(--line);margin:20px 0;}

  /* ===== STATS ===== */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:20px;}
  .stat-card{background:linear-gradient(160deg,var(--card),var(--panel));border:1px solid var(--line);border-radius:16px;padding:20px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .stat-card::after{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(1,195,142,.1),transparent 70%);}
  .stat-card.green::after{background:radial-gradient(circle,rgba(46,204,113,.12),transparent 70%);}
  .stat-card.blue::after{background:radial-gradient(circle,rgba(52,152,219,.12),transparent 70%);}
  .stat-card.red::after{background:radial-gradient(circle,rgba(192,57,43,.12),transparent 70%);}
  .stat-icon{width:40px;height:40px;border-radius:11px;background:rgba(1,195,142,.12);display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
  .stat-icon svg{width:21px;height:21px;color:var(--gold);}
  .stat-card.green .stat-icon{background:rgba(46,204,113,.12);} .stat-card.green .stat-icon svg{color:var(--green);}
  .stat-card.blue .stat-icon{background:rgba(52,152,219,.12);} .stat-card.blue .stat-icon svg{color:var(--blue-l);}
  .stat-card.red .stat-icon{background:rgba(192,57,43,.12);} .stat-card.red .stat-icon svg{color:var(--red-l);}
  .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .stat-value{font-size:27px;font-weight:800;margin:6px 0 3px;letter-spacing:-.5px;}
  .stat-sub{font-size:12px;color:var(--muted);}

  /* ===== TABLE ===== */
  .table-wrap{overflow-x:auto;border-radius:12px;}
  .tbl{width:100%;border-collapse:collapse;font-size:14px;}
  .tbl th{text-align:left;padding:11px 14px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;border-bottom:1px solid var(--line);}
  .tbl td{padding:13px 14px;border-bottom:1px solid var(--line2);vertical-align:middle;}
  .tbl tr:hover td{background:rgba(255,255,255,.02);}
  .actions{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{font-size:12px;padding:3px 11px;border-radius:20px;font-weight:600;display:inline-block;}
  .pill-green{background:rgba(46,204,113,.15);color:#4ade80;}
  .pill-red{background:rgba(192,57,43,.15);color:#f87171;}
  .pill-gold{background:rgba(1,195,142,.15);color:var(--gold-l);}

  /* ===== FORMS ===== */
  .form-row{margin-bottom:15px;}
  .form-row label{display:block;font-size:13px;color:var(--txt2);margin-bottom:6px;font-weight:500;}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--line2);border-radius:11px;color:var(--txt);font-size:14px;transition:.15s;}
  .form-row input:focus,.form-row select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(1,195,142,.1);}
  input[type=color]{height:46px;padding:4px;cursor:pointer;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
  @media(max-width:560px){.grid2{grid-template-columns:1fr;}}
  .func-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:11px;}
  .check{display:flex;align-items:center;gap:9px;font-size:14px;background:var(--bg2);border:1px solid var(--line2);border-radius:11px;padding:12px 14px;cursor:pointer;transition:.15s;}
  .check:hover{border-color:rgba(1,195,142,.3);}
  .check input{width:17px;height:17px;accent-color:var(--gold);}
  .func-active{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:13px;font-weight:600;color:var(--txt2);}

  /* ===== BUTTONS ===== */
  .btn{border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--txt);padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{background:rgba(255,255,255,.1);transform:translateY(-1px);}
  .btn svg{width:16px;height:16px;}
  .btn-sm{padding:7px 12px;font-size:12px;}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#000;border-color:var(--gold);font-weight:700;}
  .btn-gold:hover{box-shadow:0 6px 20px rgba(1,195,142,.3);}
  .btn-green{background:var(--green-d);color:#fff;border-color:var(--green-d);}
  .btn-warn{background:var(--orange);color:#fff;border-color:var(--orange);}
  .btn-danger{background:var(--red);color:#fff;border-color:var(--red);}
  .btn-ghost{background:transparent;}
  .btn-block{width:100%;justify-content:center;margin-top:18px;padding:14px;font-size:15px;}

  /* ===== TABS ===== */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap;}
  .tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;}
  .tab:hover{color:var(--txt2);}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .inv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
  .txt-red{color:#f87171;font-weight:700;}

  /* ===== RECETAS ===== */
  .receta-card{background:var(--bg2);border:1px solid var(--line2);border-radius:12px;padding:14px;margin-bottom:11px;}
  .receta-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
  .receta-items{display:flex;gap:7px;flex-wrap:wrap;}
  .receta-pill{background:rgba(1,195,142,.12);color:var(--gold-l);font-size:12px;padding:5px 11px;border-radius:20px;}

  /* ===== VENTAS ===== */
  .venta-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;}
  @media(max-width:900px){.venta-layout{grid-template-columns:1fr;}}
  .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
  .prod-btn{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:16px 12px;cursor:pointer;display:flex;flex-direction:column;gap:7px;text-align:left;transition:.15s;}
  .prod-btn:hover{background:rgba(1,195,142,.06);transform:translateY(-3px);box-shadow:var(--shadow);border-color:rgba(1,195,142,.3);}
  .prod-nombre{font-size:14px;font-weight:600;}
  .prod-precio{font-size:16px;font-weight:800;color:var(--gold);}
  .carrito-card{align-self:start;position:sticky;top:90px;}
  .carrito-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line2);}
  .ci-info{flex:1;display:flex;flex-direction:column;}
  .ci-info .muted{font-size:12px;}
  .ci-controls{display:flex;align-items:center;gap:9px;}
  .ci-qty{min-width:24px;text-align:center;font-weight:700;}
  .ci-total{min-width:72px;text-align:right;font-weight:700;}
  .carrito-total{display:flex;justify-content:space-between;font-size:22px;font-weight:800;padding:16px 0;border-top:2px solid var(--gold);margin-top:12px;}

  /* ===== CAJA ===== */
  .resumen-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line2);font-size:15px;}
  .resumen-row.big{font-size:19px;font-weight:700;border-top:2px solid var(--gold);border-bottom:none;margin-top:8px;padding-top:14px;}
  .text-green{color:var(--green)!important;} .text-red{color:var(--red-l,#f87171)!important;} .text-gold{color:var(--gold)!important;}

  /* Gráfico de barras */
  .bar-chart{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:180px;padding:20px 4px 0;}
  .bar-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
  .bar-val{font-size:11px;color:var(--gold-l);font-weight:700;min-height:14px;}
  .bar-fill{width:100%;max-width:44px;background:linear-gradient(180deg,var(--gold-l),var(--gold-d));border-radius:6px 6px 0 0;min-height:4px;transition:height .3s;}
  .bar-label{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;}

  /* ===== LOGIN ===== */
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at 25% 15%,rgba(1,195,142,.1),transparent 55%),radial-gradient(circle at 80% 80%,rgba(192,57,43,.08),transparent 55%),var(--bg);}
  .login-box{background:linear-gradient(160deg,var(--card),var(--panel));border:1px solid var(--line);border-radius:22px;padding:40px 36px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);}
  .login-logo{font-size:34px;font-weight:900;text-align:center;letter-spacing:-1px;}
  .login-logo span{color:var(--gold);}
  .login-sub{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 28px;}
  .login-demo{margin-top:20px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:2;}
  .login-credit{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;letter-spacing:1.5px;}

  /* ===== TOAST ===== */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:14px 24px;border-radius:13px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:100;box-shadow:var(--shadow-lg);}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .toast.success{border-color:var(--green);} .toast.error{border-color:var(--red);} .toast.info{border-color:var(--blue);}

  /* Modales elegantes */
  #modal-container{display:none;}
  #modal-container.activo{display:block;}
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px;animation:fadeIn .15s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-box{background:var(--panel2,#1c2024);border:1px solid var(--line);border-radius:16px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg,0 20px 60px rgba(0,0,0,.5));animation:slideUp .2s ease;}
  .modal-sm{max-width:380px;}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);font-size:17px;font-weight:700;}
  .modal-x{background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;line-height:1;padding:0;width:32px;height:32px;border-radius:8px;}
  .modal-x:hover{background:rgba(255,255,255,.08);color:var(--txt);}
  .modal-body{padding:20px 22px;}
  .m-row{margin-bottom:15px;}
  .m-row label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .m-row input,.m-row select,.m-row textarea{width:100%;padding:12px 14px;background:var(--panel,#12151a);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:15px;font-family:inherit;box-sizing:border-box;}
  .m-row input:focus,.m-row select:focus,.m-row textarea:focus{outline:none;border-color:var(--gold);}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--line);}
  .modal-foot .btn{padding:11px 20px;}

  /* Ventas POS */
  .venta-layout{display:grid;grid-template-columns:1fr 380px;gap:18px;align-items:start;}
  @media(max-width:900px){.venta-layout{grid-template-columns:1fr;}}
  .venta-search{width:100%;padding:13px 16px;background:var(--panel2);border:1px solid var(--line2);border-radius:12px;color:var(--txt);font-size:15px;}
  .venta-search:focus{outline:none;border-color:var(--gold);}
  .category-tabs{display:flex;gap:8px;flex-wrap:wrap;}
  .cat-tab{background:var(--panel2);border:1px solid var(--line2);color:var(--muted);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;}
  .cat-tab.active{background:var(--gold);color:#1a1400;border-color:var(--gold);}
  .cat-tab:hover:not(.active){border-color:var(--gold);color:var(--txt);}
  .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;max-height:calc(100vh - 230px);overflow-y:auto;padding:2px;}
  .menu-item-card{background:linear-gradient(160deg,var(--card),var(--panel));border:1px solid var(--line2);border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .menu-item-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 6px 18px rgba(0,0,0,.3);}
  .item-ic{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.7;}
  .item-ic svg{width:26px;height:26px;}
  .item-img{width:100%;height:80px;background-size:cover;background-position:center;border-radius:10px;margin-bottom:2px;}
  .item-name{font-size:13px;font-weight:600;color:var(--txt);line-height:1.25;}
  .item-price{font-size:15px;font-weight:800;color:var(--gold);}
  .carrito-card{align-self:start;position:sticky;top:16px;}
  .tipo-toggle{display:flex;gap:6px;margin-bottom:10px;}
  .tipo-toggle .btn{flex:1;}
  .mini-input{width:100%;padding:10px 12px;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;color:var(--txt);font-size:13px;margin-bottom:8px;box-sizing:border-box;}
  .mini-input:focus{outline:none;border-color:var(--gold);}
  .order-items{max-height:38vh;overflow-y:auto;margin:4px 0;}
  .carrito-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);}
  .ci-info{flex:1;display:flex;flex-direction:column;min-width:0;}
  .ci-info strong{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ci-info .muted{font-size:11px;}
  .ci-controls{display:flex;align-items:center;gap:6px;}
  .ci-qty{min-width:20px;text-align:center;font-weight:700;font-size:14px;}
  .ci-total{min-width:64px;text-align:right;font-weight:700;font-size:13px;}
  .carrito-total{display:flex;justify-content:space-between;font-size:19px;font-weight:800;padding:12px 0;border-top:2px solid var(--gold);margin-top:8px;color:var(--gold);}
  .empty-cart{text-align:center;color:var(--muted);padding:40px 20px;font-size:36px;}
  .empty-cart p{font-size:13px;margin-top:8px;}

  /* Catálogo con imágenes */
  .catalogo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;width:100%;}
  .cat-card{background:linear-gradient(160deg,var(--card),var(--panel));border:1px solid var(--line2);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:.15s;min-width:0;max-width:100%;}
  .cat-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.3);}
  .cat-card.agotado{opacity:.6;}
