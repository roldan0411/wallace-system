<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallace System — Software administrativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#01c38e; --verde-c:#2ee6ab; --verde-o:#00a878;
    --navy:#132d46; --navy-o:#0e2135;
    --oro:#f5c518; --oro-c:#ffd84d; --oro-o:#d9a80e;
    --rojo:#ff5c6a; --azul:#4cc9f0; --naranja:#ff9f3c;
    --bg:#12151d; --panel:#1a1e29; --panel2:#222836;
    --txt:#eef2f6; --txt2:#c6cfd9; --gris:#8792a1;
    --linea:rgba(var(--acc-rgb),.35); --linea2:rgba(255,255,255,.07);
    --sombra:0 4px 18px rgba(0,0,0,.45);
    --sombra-g:0 10px 34px rgba(0,0,0,.6);
    --glow:0 0 16px rgba(var(--acc-rgb),.45);
    --glow-txt:0 0 12px rgba(var(--acc-rgb),.5);
    --gold:var(--oro);
    --acc-rgb:1,195,142;
    --acc-txt:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;
    background:radial-gradient(900px 520px at 85% -10%,rgba(var(--acc-rgb),.09),transparent 60%),
               radial-gradient(760px 460px at -10% 110%,rgba(19,45,70,.55),transparent 60%),
               var(--bg);}
  button,input,select,textarea{font-family:inherit;font-size:inherit;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#2a3140;border-radius:8px;}
  ::-webkit-scrollbar-thumb:hover{background:#39424f;}
  select option{background:var(--panel);color:var(--txt);}

  /* Carga */
  .cargando{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:var(--gris);}
  .spin{width:52px;height:52px;border:3px solid rgba(var(--acc-rgb),.18);border-top-color:var(--verde-c);border-radius:50%;
    animation:girar .8s linear infinite;margin-bottom:16px;box-shadow:0 0 22px rgba(var(--acc-rgb),.25);}
  @keyframes girar{to{transform:rotate(360deg)}}

  /* Login */
  .login-fondo{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(760px 500px at 50% 18%,rgba(var(--acc-rgb),.14),transparent 62%),
               linear-gradient(160deg,#171b26,#101318 65%);}
  .login-caja{background:linear-gradient(170deg,#20263300,#00000000),linear-gradient(170deg,#232937,#191e28);border:1px solid var(--linea);border-radius:20px;
    padding:36px 30px;width:100%;max-width:380px;
    box-shadow:0 0 0 1px rgba(var(--acc-rgb),.08),0 0 42px rgba(var(--acc-rgb),.16),0 26px 70px rgba(0,0,0,.65);}
  .login-emblema{width:92px;height:92px;margin:0 auto 16px;border-radius:22px;overflow:hidden;
    box-shadow:0 0 30px rgba(var(--acc-rgb),.5),0 10px 30px rgba(0,0,0,.5);}
  .login-emblema svg{width:100%;height:100%;display:block;}
  .login-marca{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:900;text-align:center;letter-spacing:-.5px;}
  .login-marca span{color:var(--verde-c);text-shadow:var(--glow-txt);}
  .login-sub{text-align:center;color:var(--gris);font-size:13px;margin:6px 0 22px;letter-spacing:.4px;}
  .login-pie{text-align:center;font-size:10px;color:var(--gris);letter-spacing:1.6px;margin-top:20px;padding-top:16px;border-top:1px solid var(--linea2);}

  /* Estructura */
  .app-grid{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
  .sidebar{background:linear-gradient(180deg,#191e28,#151923);border-right:1px solid var(--linea2);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .side-cab{padding:22px 18px;text-align:center;border-bottom:1px solid var(--linea2);}
  .side-logo{max-width:82px;max-height:82px;border-radius:12px;margin-bottom:10px;box-shadow:0 0 18px rgba(var(--acc-rgb),.25);}
  .side-ini{width:60px;height:60px;margin:0 auto 10px;border-radius:14px;background:linear-gradient(135deg,var(--verde),var(--verde-o));
    color:var(--acc-txt);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;box-shadow:var(--glow);}
  .side-nom{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:800;letter-spacing:.2px;}
  .side-tipo{font-size:10px;color:var(--verde);letter-spacing:1.8px;text-transform:uppercase;margin-top:3px;}
  .side-nav{flex:1;padding:14px 12px;}
  .nav-grupo{font-size:10px;color:var(--gris);letter-spacing:1.8px;padding:16px 10px 7px;font-weight:700;}
  .nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;cursor:pointer;
    color:var(--txt2);font-size:14px;font-weight:500;transition:.15s;margin-bottom:2px;border:1px solid transparent;}
  .nav-item:hover{background:rgba(var(--acc-rgb),.07);color:var(--txt);}
  .nav-item.on{background:rgba(var(--acc-rgb),.13);color:var(--verde-c);font-weight:700;border-color:rgba(var(--acc-rgb),.3);
    box-shadow:inset 0 0 18px rgba(var(--acc-rgb),.10),0 0 12px rgba(var(--acc-rgb),.12);text-shadow:0 0 10px rgba(var(--acc-rgb),.4);}
  .nav-item svg{width:19px;height:19px;flex-shrink:0;}
  .side-pie{padding:14px;border-top:1px solid var(--linea2);}
  .user-box{display:flex;align-items:center;gap:10px;}
  .avatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--verde),var(--verde-o));
    color:var(--acc-txt);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;box-shadow:var(--glow);}
  .user-info{flex:1;min-width:0;}
  .u-nom{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .u-est{font-size:10px;color:var(--gris);display:flex;align-items:center;gap:5px;}
  .fb-dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:var(--gris);}
  .fb-dot.ok{background:var(--verde-c);box-shadow:0 0 8px var(--verde-c),0 0 16px rgba(var(--acc-rgb),.5);}
  .fb-dot.off{background:var(--rojo);box-shadow:0 0 8px rgba(255,92,106,.6);}
  .fb-dot.err{background:var(--naranja);animation:parp 1.2s infinite;box-shadow:0 0 8px rgba(255,180,84,.6);}
  @keyframes parp{0%,100%{opacity:1}50%{opacity:.3}}
  .credito{margin-top:12px;padding-top:11px;border-top:1px solid var(--linea2);text-align:center;}
  .c-marca{display:block;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;color:var(--txt2);}
  .c-marca span{color:var(--verde-c);text-shadow:0 0 8px rgba(var(--acc-rgb),.4);}
  .c-sub{display:block;font-size:9px;color:var(--gris);letter-spacing:1.4px;text-transform:uppercase;margin-top:2px;}

  .main{display:flex;flex-direction:column;min-width:0;}
  .banner-sup{background:linear-gradient(90deg,rgba(var(--acc-rgb),.18),transparent);border-bottom:1px solid var(--linea);
    padding:10px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    font-size:13px;font-weight:600;color:var(--verde-c);}
  .topbar{background:rgba(26,30,41,.94);backdrop-filter:blur(6px);border-bottom:1px solid rgba(var(--acc-rgb),.22);padding:16px 26px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:40;}
  .topbar h1{font-family:'Montserrat',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.3px;
    display:flex;align-items:center;gap:10px;}
  .topbar h1 svg{width:22px;height:22px;color:var(--verde-c);filter:drop-shadow(0 0 6px rgba(var(--acc-rgb),.6));}
  .tb-der{display:flex;align-items:center;gap:12px;}
  .reloj{font-size:13px;color:var(--verde-c);font-variant-numeric:tabular-nums;text-shadow:0 0 8px rgba(var(--acc-rgb),.35);}
  .menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt);}
  .suc-sel{padding:8px 12px;background:var(--panel2);border:1px solid var(--linea);border-radius:9px;
    color:var(--verde-c);font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 0 12px rgba(var(--acc-rgb),.12);}
  .contenido{padding:24px 26px;max-width:1280px;width:100%;margin:0 auto;flex:1;min-width:0;}

  /* Tarjetas */
  .tarjeta{background:linear-gradient(170deg,#212734,#1a1f2a);border:1px solid var(--linea2);border-radius:16px;
    padding:20px;margin-bottom:18px;box-shadow:var(--sombra);}
  .t-cab{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .t-tit{font-size:16px;font-weight:800;display:flex;align-items:center;gap:9px;}
  .t-tit svg{width:19px;height:19px;color:var(--verde-c);filter:drop-shadow(0 0 5px rgba(var(--acc-rgb),.55));}
  .t-tit.chico{font-size:14px;}
  .t-acc{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
  .tarjeta-pend{border:1px solid rgba(var(--acc-rgb),.35);border-left:4px solid var(--verde);
    background:linear-gradient(135deg,rgba(var(--acc-rgb),.10),#1a1f2a);box-shadow:0 0 24px rgba(var(--acc-rgb),.10),var(--sombra);}
  .alerta{border-left:4px solid var(--rojo);background:linear-gradient(135deg,rgba(255,92,106,.09),#1a1f2a);}
  .alerta p{font-size:13px;line-height:1.7;margin-top:6px;}
  .centro-msg{max-width:480px;margin:40px auto;text-align:center;padding:36px 28px;}
  .msg-ico{font-size:42px;margin-bottom:12px;}
  .msg-ico svg{width:44px;height:44px;color:var(--verde-c);filter:drop-shadow(0 0 10px rgba(var(--acc-rgb),.5));}
  .t-tit.centrado{justify-content:center;margin-bottom:8px;}
  .centro-msg p{color:var(--gris);font-size:14px;line-height:1.7;margin-bottom:18px;}
  .centro-msg .btn{margin:5px;}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:18px;}
  .stat{background:linear-gradient(170deg,#20263200,#00000000),linear-gradient(170deg,#232937,#1b202b);
    border:1px solid rgba(255,255,255,.06);border-radius:18px;
    padding:18px 20px;box-shadow:var(--sombra);position:relative;overflow:hidden;}
  .stat::after{content:'';position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(150px 100px at 82% 15%,rgba(255,255,255,.05),transparent 70%);}
  .stat.verde::after{background:radial-gradient(160px 110px at 80% 12%,rgba(var(--acc-rgb),.16),transparent 70%);}
  .stat.gold::after{background:radial-gradient(160px 110px at 80% 12%,rgba(245,197,24,.15),transparent 70%);}
  .stat.azul::after{background:radial-gradient(160px 110px at 80% 12%,rgba(76,201,240,.15),transparent 70%);}
  .stat.rojo::after{background:radial-gradient(160px 110px at 80% 12%,rgba(255,92,106,.15),transparent 70%);}
  .stat.naranja::after{background:radial-gradient(160px 110px at 80% 12%,rgba(255,159,60,.16),transparent 70%);}
  .stat-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    margin-bottom:11px;background:rgba(255,255,255,.06);color:var(--txt);}
  .stat-ico svg{width:21px;height:21px;}
  .stat-ico.gold{background:rgba(245,197,24,.13);color:var(--oro-c);box-shadow:0 0 16px rgba(245,197,24,.30);}
  .stat-ico.verde{background:rgba(var(--acc-rgb),.14);color:var(--verde-c);box-shadow:0 0 16px rgba(var(--acc-rgb),.32);}
  .stat-ico.azul{background:rgba(76,201,240,.13);color:var(--azul);box-shadow:0 0 16px rgba(76,201,240,.30);}
  .stat-ico.naranja{background:rgba(255,159,60,.14);color:var(--naranja);box-shadow:0 0 16px rgba(255,159,60,.30);}
  .stat-ico.rojo{background:rgba(255,92,106,.14);color:var(--rojo);box-shadow:0 0 16px rgba(255,92,106,.30);}
  .stat-lbl{font-size:11px;color:var(--gris);letter-spacing:.6px;text-transform:uppercase;font-weight:600;}
  .stat-val{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:800;margin:5px 0 3px;letter-spacing:-.5px;
    color:#fff;text-shadow:0 0 14px rgba(var(--acc-rgb),.28);}
  .stat-sub{font-size:11px;color:var(--gris);}
  .stat-grande{font-family:'Montserrat',sans-serif;font-size:36px;font-weight:800;text-align:center;
    color:var(--verde-c);text-shadow:var(--glow-txt);margin:10px 0;}

  /* Botones */
  .btn{background:var(--panel2);border:1px solid var(--linea2);color:var(--txt);padding:9px 15px;border-radius:10px;
    cursor:pointer;font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{background:#2a3140;border-color:rgba(var(--acc-rgb),.35);}
  .btn svg{width:15px;height:15px;}
  .btn-gold{background:linear-gradient(135deg,var(--oro-c),var(--oro-o));color:#231a00;border:none;font-weight:800;
    box-shadow:0 0 18px rgba(245,197,24,.4),0 4px 14px rgba(0,0,0,.4);text-shadow:none;}
  .btn-gold:hover{filter:brightness(1.1);box-shadow:0 0 26px rgba(245,197,24,.6),0 4px 14px rgba(0,0,0,.4);}
  .btn-naranja{background:linear-gradient(135deg,#ffb254,#f28018);color:#2b1500;border:none;font-weight:800;
    box-shadow:0 0 16px rgba(255,159,60,.4);}
  .btn-naranja:hover{filter:brightness(1.1);}
  .btn-rojo{background:linear-gradient(135deg,#ff5c6a,#d63a49);color:#fff;border:none;box-shadow:0 0 14px rgba(255,92,106,.3);}
  .btn-verde{background:linear-gradient(135deg,var(--verde-c),var(--verde-o));color:var(--acc-txt);border:none;font-weight:800;
    box-shadow:0 0 18px rgba(var(--acc-rgb),.5);}
  .btn-verde:hover{filter:brightness(1.1);box-shadow:0 0 26px rgba(var(--acc-rgb),.65);}
  .btn-ghost{background:transparent;}
  .btn-sm{padding:7px 11px;font-size:12px;}
  .btn-block{width:100%;justify-content:center;margin-top:12px;}
  .btn-grande{padding:14px;font-size:15px;}
  .botones-fila{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}

  /* Formularios */
  .campo{width:100%;padding:11px 14px;background:#141821;border:1px solid var(--linea2);
    border-radius:10px;color:var(--txt);margin-bottom:9px;}
  .campo:focus{outline:none;border-color:var(--verde);background:#171c26;box-shadow:0 0 0 3px rgba(var(--acc-rgb),.15),0 0 14px rgba(var(--acc-rgb),.2);}
  .campo::placeholder{color:#67707e;}
  .busca{padding:9px 13px;background:#141821;border:1px solid var(--linea2);border-radius:10px;color:var(--txt);min-width:190px;}
  .busca:focus{outline:none;border-color:var(--verde);box-shadow:0 0 12px rgba(var(--acc-rgb),.2);}
  .busca::placeholder{color:#67707e;}
  .busca-grande{width:100%;padding:14px 18px;background:#141821;border:1px solid var(--linea2);
    border-radius:12px;color:var(--txt);font-size:15px;margin-bottom:14px;box-shadow:var(--sombra);}
  .busca-grande:focus{outline:none;border-color:var(--verde);box-shadow:0 0 16px rgba(var(--acc-rgb),.25);}
  .busca-grande::placeholder{color:#67707e;}
  .m-row{margin-bottom:13px;}
  .m-row label{display:block;font-size:12px;color:var(--gris);margin-bottom:5px;font-weight:600;}
  .m-row input,.m-row select,.m-row textarea{width:100%;padding:11px 14px;background:#141821;
    border:1px solid var(--linea2);border-radius:10px;color:var(--txt);}
  .m-row input:focus,.m-row select:focus,.m-row textarea:focus{outline:none;border-color:var(--verde);
    box-shadow:0 0 0 3px rgba(var(--acc-rgb),.15);}
  .form2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;}
  .chk{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#141821;
    border:1px solid var(--linea2);border-radius:10px;cursor:pointer;font-size:13px;}
  .chk input{width:16px;height:16px;accent-color:var(--verde);cursor:pointer;}
  .nota{font-size:12px;color:var(--gris);margin-top:-4px;margin-bottom:10px;}
  .suc-fila{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .suc-fila .campo{margin-bottom:0;}

  /* Tablas */
  .tabla-wrap{overflow-x:auto;border-radius:11px;}
  .tabla{width:100%;border-collapse:collapse;font-size:13.5px;}
  .tabla th{text-align:left;padding:12px 14px;color:var(--verde);font-size:11px;letter-spacing:.8px;
    text-transform:uppercase;font-weight:700;border-bottom:1px solid rgba(var(--acc-rgb),.25);white-space:nowrap;}
  .tabla td{padding:13px 14px;border-bottom:1px solid var(--linea2);vertical-align:middle;}
  .tabla tr:last-child td{border-bottom:none;}
  .tabla tbody tr:hover td{background:rgba(var(--acc-rgb),.04);}
  .fila-pend{background:rgba(var(--acc-rgb),.06);}
  .acciones{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

  /* Píldoras */
  .pill{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;
    background:var(--panel2);border:1px solid var(--linea2);}
  .pill-verde{background:rgba(var(--acc-rgb),.14);color:var(--verde-c);border-color:rgba(var(--acc-rgb),.45);box-shadow:0 0 10px rgba(var(--acc-rgb),.18);}
  .pill-rojo{background:rgba(255,92,106,.12);color:var(--rojo);border-color:rgba(255,92,106,.4);box-shadow:0 0 10px rgba(255,92,106,.14);}
  .pill-gold{background:rgba(245,197,24,.13);color:var(--oro-c);border-color:rgba(245,197,24,.45);box-shadow:0 0 10px rgba(245,197,24,.2);}
  .pill-oro{background:linear-gradient(135deg,rgba(245,197,24,.22),rgba(217,168,14,.16));color:var(--oro-c);
    border:1px solid rgba(245,197,24,.5);box-shadow:0 0 12px rgba(245,197,24,.25);}
  .pill.grande{font-size:14px;padding:7px 15px;}

  /* Colores de texto */
  .verde{color:var(--verde-c);} .rojo{color:var(--rojo);} .azul{color:var(--azul);}
  .oro{color:var(--verde-c);text-shadow:0 0 8px rgba(var(--acc-rgb),.3);} .gris{color:var(--gris);} .negrita{font-weight:700;}
  .chico{font-size:11.5px;} .centrado{text-align:center;}

  /* Líneas de resumen */
  .linea{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;
    border-bottom:1px solid var(--linea2);font-size:14px;}
  .linea:last-child{border-bottom:none;}
  .linea.desc{color:var(--rojo);}
  .total-linea{border-top:2px solid var(--verde);border-bottom:none;margin-top:6px;padding-top:12px;font-weight:800;font-size:15px;
    color:var(--verde-c);text-shadow:0 0 10px rgba(var(--acc-rgb),.3);}
  .mini-x{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:16px;padding:0 4px;}

  /* Grid 2 columnas */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

  /* Venta */
  .caja-aviso{padding:11px 16px;margin-bottom:16px;background:rgba(var(--acc-rgb),.09);
    border:1px solid rgba(var(--acc-rgb),.35);border-radius:11px;font-size:13px;color:var(--txt2);
    box-shadow:0 0 16px rgba(var(--acc-rgb),.08);}
  .venta-grid{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:18px;align-items:start;width:100%;}
  .venta-izq{min-width:0;}
  .carrito{position:sticky;top:86px;min-width:0;}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .cat{background:var(--panel2);border:1px solid var(--linea2);color:var(--gris);padding:8px 15px;
    border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;}
  .cat.on{background:linear-gradient(135deg,var(--verde),var(--verde-o));color:var(--acc-txt);border-color:var(--verde);
    box-shadow:0 0 16px rgba(var(--acc-rgb),.45);font-weight:800;}
  .prods{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:13px;}
  .prod{background:linear-gradient(170deg,#232937,#1b202b);border:1px solid var(--linea2);border-radius:14px;padding:15px;
    text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--sombra);}
  .prod:hover{transform:translateY(-2px);border-color:rgba(var(--acc-rgb),.55);
    box-shadow:0 0 22px rgba(var(--acc-rgb),.22),var(--sombra-g);}
  .prod.off{opacity:.45;}
  .prod-ico{height:46px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;position:relative;}
  .prod-ico svg{width:26px;height:26px;color:var(--verde-c);filter:drop-shadow(0 0 6px rgba(var(--acc-rgb),.5));}
  .prod-ico img{max-height:46px;max-width:100%;border-radius:8px;}
  .badge-off{position:absolute;top:-4px;right:-4px;background:var(--rojo);color:#fff;
    font-size:8px;padding:2px 6px;border-radius:8px;font-weight:800;box-shadow:0 0 8px rgba(255,92,106,.5);}
  .badge-off.amarillo{background:var(--naranja);box-shadow:0 0 8px rgba(255,180,84,.5);}
  .prod-nom{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:4px;}
  .prod-cat{font-size:10px;color:var(--gris);margin-bottom:5px;}
  .prod-pre{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;color:var(--verde-c);text-shadow:0 0 8px rgba(var(--acc-rgb),.3);}
  .prod-stock{font-size:10.5px;color:var(--gris);margin-top:4px;}
  .prod-stock.poco{color:var(--naranja);font-weight:700;}
  .prod-stock.sin{color:var(--rojo);font-weight:700;}
  .prod-acc{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:9px;}
  .prods.inv .prod{cursor:default;}
  .prods.inv .prod:hover{transform:none;}
  .tipos{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;}
  .tipo{flex:1;min-width:80px;background:#141821;border:1px solid var(--linea2);color:var(--gris);
    padding:9px 6px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
  .tipo.on{background:linear-gradient(135deg,var(--verde),var(--verde-o));color:var(--acc-txt);border-color:var(--verde);
    box-shadow:0 0 14px rgba(var(--acc-rgb),.4);}
  .items{margin:12px 0;max-height:230px;overflow-y:auto;}
  .item{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--linea2);}
  .item-info{flex:1;min-width:0;}
  .item-nom{font-size:13px;font-weight:700;}
  .item-uni{font-size:11px;color:var(--gris);}
  .item-qty{display:flex;align-items:center;gap:7px;}
  .item-qty button{width:26px;height:26px;border-radius:7px;border:1px solid var(--linea2);
    background:var(--panel2);cursor:pointer;font-size:15px;font-weight:700;color:var(--txt);}
  .item-qty button:hover{border-color:var(--verde);color:var(--verde-c);}
  .item-qty span{min-width:20px;text-align:center;font-weight:700;font-size:14px;}
  .item-tot{font-weight:700;font-size:13.5px;min-width:72px;text-align:right;}
  .carrito-vacio{text-align:center;color:var(--gris);padding:32px 16px;font-size:32px;}
  .carrito-vacio p{font-size:12.5px;margin-top:8px;}
  .total{display:flex;justify-content:space-between;font-family:'Montserrat',sans-serif;font-size:21px;font-weight:800;
    padding:14px 0;border-top:2px solid var(--verde);margin-top:10px;color:var(--verde-c);text-shadow:var(--glow-txt);}

  /* Barras */
  .barras{display:flex;align-items:flex-end;gap:7px;height:165px;padding-top:16px;}
  .barra{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .b-val{font-size:9.5px;color:var(--gris);height:12px;}
  .b-fill{width:100%;background:linear-gradient(180deg,var(--verde-c),var(--verde-o));border-radius:6px 6px 0 0;
    min-height:4px;box-shadow:0 0 12px rgba(var(--acc-rgb),.35);}
  .b-lbl{font-size:10px;color:var(--gris);font-weight:600;}

  /* Logo del negocio */
  .logo-zona{display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-top:14px;}
  .logo-vista{width:130px;height:130px;border:2px dashed rgba(var(--acc-rgb),.35);border-radius:14px;
    display:flex;align-items:center;justify-content:center;overflow:hidden;background:#141821;flex-shrink:0;}
  .logo-vista img{max-width:100%;max-height:100%;object-fit:contain;}
  .logo-vacio{color:var(--gris);font-size:12px;}
  .logo-acc{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}

  /* Modal */
  #modal-container{display:none;}
  #modal-container.activo{display:block;}
  .modal-fondo{position:fixed;inset:0;background:rgba(6,8,12,.74);backdrop-filter:blur(4px);z-index:100;}
  .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:linear-gradient(170deg,#242a38,#1b202b);border:1px solid var(--linea);
    border-radius:18px;width:calc(100% - 32px);max-width:460px;max-height:88vh;overflow-y:auto;
    z-index:101;box-shadow:0 0 40px rgba(var(--acc-rgb),.14),0 28px 80px rgba(0,0,0,.7);}
  .modal-cab{padding:19px 22px;border-bottom:1px solid var(--linea2);display:flex;
    align-items:center;justify-content:space-between;}
  .modal-cab h3{font-size:17px;font-weight:800;}
  .modal-x{background:none;border:none;font-size:26px;color:var(--gris);cursor:pointer;line-height:1;}
  .modal-x:hover{color:var(--rojo);}
  .modal-cuerpo{padding:20px 22px;}
  .modal-pie{padding:15px 22px;border-top:1px solid var(--linea2);display:flex;gap:9px;justify-content:flex-end;}
  .cobro-caja{margin-top:8px;padding:15px 17px;background:#141821;border:1px solid var(--linea2);border-radius:12px;}
  .c-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px;}
  .c-total{border-top:2px solid var(--verde);margin-top:8px;padding-top:12px;font-size:17px;font-weight:800;}
  .c-total strong{color:var(--verde-c);font-size:21px;text-shadow:0 0 10px rgba(var(--acc-rgb),.4);}
  .c-nota{display:none;margin-top:11px;padding:10px 13px;background:rgba(var(--acc-rgb),.08);
    border-left:3px solid var(--verde);border-radius:7px;font-size:12px;line-height:1.6;color:var(--txt2);}

  /* Avisos */
  #toasts{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:9px;}
  .toast{background:linear-gradient(170deg,#242a38,#1b202b);border:1px solid rgba(var(--acc-rgb),.4);border-left:4px solid var(--verde);
    padding:13px 18px;border-radius:11px;font-size:13.5px;font-weight:600;color:var(--txt);
    box-shadow:0 0 22px rgba(var(--acc-rgb),.16),var(--sombra-g);animation:entrar .25s ease;max-width:330px;}
  .toast.error{border-color:rgba(255,92,106,.45);border-left-color:var(--rojo);box-shadow:0 0 22px rgba(255,92,106,.16),var(--sombra-g);}
  .toast.info{border-color:rgba(76,201,240,.4);border-left-color:var(--azul);box-shadow:0 0 22px rgba(76,201,240,.14),var(--sombra-g);}
  .toast.salir{animation:salir .3s ease forwards;}
  @keyframes entrar{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
  @keyframes salir{to{opacity:0;transform:translateX(30px)}}

  /* Super-admin */
  .sa-emblema{display:inline-block;width:32px;height:32px;border-radius:9px;overflow:hidden;vertical-align:middle;
    box-shadow:0 0 14px rgba(var(--acc-rgb),.35);}
  .sa-emblema svg{width:100%;height:100%;display:block;}
  .sa-marca{font-family:'Montserrat',sans-serif;font-weight:900;letter-spacing:-.4px;}
  .sa-marca span{color:var(--verde-c);text-shadow:var(--glow-txt);}


  /* ============ TEMA CLARO (elegible por negocio) ============ */
  body.tema-claro{
    --bg:#eef1f6; --panel:#ffffff; --panel2:#f3f5f9;
    --txt:#1a1e29; --txt2:#3a4250; --gris:#69748a;
    --linea2:rgba(19,45,70,.10);
    --sombra:0 2px 12px rgba(19,45,70,.08);
    --sombra-g:0 10px 30px rgba(19,45,70,.16);
    background:radial-gradient(900px 520px at 85% -10%,rgba(var(--acc-rgb),.08),transparent 60%),#eef1f6;
    color:var(--txt);
  }
  body.tema-claro ::-webkit-scrollbar-thumb{background:#c6ccd8;}
  body.tema-claro ::-webkit-scrollbar-thumb:hover{background:#aab2c2;}
  body.tema-claro select option{background:#fff;color:#1a1e29;}
  body.tema-claro .sidebar{background:#ffffff;border-right:1px solid var(--linea2);}
  body.tema-claro .topbar{background:rgba(255,255,255,.94);border-bottom:1px solid rgba(var(--acc-rgb),.25);}
  body.tema-claro .reloj{color:var(--verde-o);text-shadow:none;}
  body.tema-claro .tarjeta{background:#ffffff;box-shadow:var(--sombra);}
  body.tema-claro .tarjeta-pend{background:linear-gradient(135deg,rgba(var(--acc-rgb),.07),#ffffff);}
  body.tema-claro .alerta{background:linear-gradient(135deg,rgba(255,92,106,.06),#ffffff);}
  body.tema-claro .stat{background:#ffffff;border:1px solid var(--linea2);}
  body.tema-claro .stat-val{color:#132d46;text-shadow:none;}
  body.tema-claro .stat-ico{background:rgba(19,45,70,.06);color:#132d46;}
  body.tema-claro .nav-item.on{box-shadow:none;text-shadow:none;color:var(--verde-o);}
  body.tema-claro .campo,body.tema-claro .busca,body.tema-claro .busca-grande,
  body.tema-claro .m-row input,body.tema-claro .m-row select,body.tema-claro .m-row textarea,
  body.tema-claro .chk,body.tema-claro .tipo,body.tema-claro .logo-vista,body.tema-claro .cobro-caja{
    background:#f3f5f9;color:var(--txt);}
  body.tema-claro .campo:focus,body.tema-claro .busca:focus,body.tema-claro .busca-grande:focus{background:#ffffff;}
  body.tema-claro .campo::placeholder,body.tema-claro .busca::placeholder,body.tema-claro .busca-grande::placeholder{color:#98a2b5;}
  body.tema-claro .btn{background:#f3f5f9;color:var(--txt);}
  body.tema-claro .btn:hover{background:#e8ecf3;}
  body.tema-claro .btn-gold{background:linear-gradient(135deg,var(--oro-c),var(--oro-o));color:#231a00;}
  body.tema-claro .btn-verde{background:linear-gradient(135deg,var(--verde),var(--verde-o));color:var(--acc-txt);}
  body.tema-claro .btn-rojo{color:#fff;}
  body.tema-claro .btn-naranja{color:#2b1500;}
  body.tema-claro .prod{background:#ffffff;}
  body.tema-claro .item-qty button{background:#f3f5f9;color:var(--txt);}
  body.tema-claro .modal{background:#ffffff;border:1px solid var(--linea2);box-shadow:0 24px 70px rgba(19,45,70,.28);}
  body.tema-claro .modal-fondo{background:rgba(19,45,70,.35);}
  body.tema-claro .toast{background:#ffffff;color:var(--txt);}
  body.tema-claro .caja-aviso{background:rgba(var(--acc-rgb),.07);color:var(--txt2);}
  body.tema-claro .oro,body.tema-claro .verde{text-shadow:none;}
  body.tema-claro .total,body.tema-claro .total-linea,body.tema-claro .stat-grande{color:var(--verde-o);text-shadow:none;}
  body.tema-claro .c-total strong{color:var(--verde-o);text-shadow:none;}
  body.tema-claro .prod-pre{color:var(--verde-o);text-shadow:none;}
  body.tema-claro .side-tipo{color:var(--verde-o);}
  body.tema-claro .t-tit svg,body.tema-claro .prod-ico svg,body.tema-claro .topbar h1 svg{color:var(--verde-o);filter:none;}
  body.tema-claro .pill-verde{color:var(--verde-o);}
  body.tema-claro .pill-gold,body.tema-claro .pill-oro{color:#a67c00;}
  body.tema-claro .c-marca span{color:var(--verde-o);text-shadow:none;}
  body.tema-claro .tabla th{color:var(--verde-o);}
  body.tema-claro .fb-dot.ok{background:var(--verde);}

  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.01ms !important;transition-duration:.01ms !important;}
  }

  /* Responsive */
  @media(max-width:1000px){
    .venta-grid{grid-template-columns:1fr;}
    .carrito{position:static;}
    .grid2{grid-template-columns:1fr;}
    .form2{grid-template-columns:1fr;}
  }
  @media(max-width:820px){
    .app-grid{grid-template-columns:1fr;}
    .sidebar{position:fixed;left:-280px;top:0;width:260px;z-index:90;transition:left .25s;box-shadow:8px 0 34px rgba(0,0,0,.6);}
    .sidebar.abierto{left:0;}
    .menu-btn{display:block;}
    .contenido{padding:18px 16px;}
    .topbar{padding:14px 16px;}
    .stats{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
  }
</style>
</head>
<body>
<div id="app"><div class="cargando"><div class="spin"></div><div>Cargando…</div></div></div>
<div id="modal-container"></div>
<div id="toasts"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="logo.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
